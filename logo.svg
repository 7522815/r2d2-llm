<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#8a9098"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Border glow -->
  <rect x="4" y="4" width="504" height="504" rx="60" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.3"/>

  <!-- R2D2 Body -->
  <g transform="translate(256, 240)" filter="url(#shadow)">
    <!-- Dome -->
    <ellipse cx="0" cy="0" rx="90" ry="90" fill="url(#dome)" stroke="#7a8088" stroke-width="2"/>
    <!-- Body base -->
    <rect x="-78" y="70" width="156" height="50" rx="8" fill="#7a8088"/>
    <!-- Legs -->
    <rect x="-60" y="118" width="20" height="35" rx="4" fill="#555"/>
    <rect x="-10" y="118" width="20" height="35" rx="4" fill="#555"/>
    <rect x="40" y="118" width="20" height="35" rx="4" fill="#555"/>
    <!-- Blue light -->
    <circle cx="0" cy="-50" r="12" fill="#3b82f6" filter="url(#glowFilter)"/>
    <circle cx="0" cy="-50" r="6" fill="#60a5fa"/>
    <!-- Red lights -->
    <circle cx="-20" cy="-58" r="8" fill="#ef4444"/>
    <circle cx="-20" cy="-58" r="4" fill="#fca5a5"/>
    <circle cx="20" cy="-58" r="8" fill="#ef4444"/>
    <circle cx="20" cy="-58" r="4" fill="#fca5a5"/>
    <!-- Eye -->
    <ellipse cx="0" cy="-18" rx="16" ry="20" fill="#111"/>
    <ellipse cx="0" cy="-22" rx="8" ry="10" fill="#3b82f6"/>
    <ellipse cx="0" cy="-24" rx="4" ry="5" fill="#60a5fa"/>
    <!-- Mouth -->
    <path d="M-20,10 Q0,24 20,10" stroke="#555" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- AI Badge -->
  <g transform="translate(256, 382)">
    <rect x="-60" y="0" width="120" height="28" rx="14" fill="url(#glow)" opacity="0.9"/>
    <text x="0" y="19" text-anchor="middle" fill="#fff" font-family="'Inter', -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">QS-MoUE</text>
  </g>

  <!-- Text -->
  <text x="256" y="452" text-anchor="middle" fill="#e2e8f0" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="1">R2D2 AI</text>
</svg>
