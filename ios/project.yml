name: R2D2
options:
  bundleIdPrefix: com.r2d2
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1,2"
  INFOPLIST_FILE: R2D2/Info.plist

targets:
  R2D2:
    type: application
    platform: iOS
    sources:
      - path: R2D2
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.r2d2.ios
      INFOPLIST_FILE: R2D2/Info.plist
      DEVELOPMENT_TEAM: ""
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: R2D2/Info.plist
    dependencies: []
    preBuildScripts:
      - name: "SwiftLint"
        script: ""
        basedOnDependencyAnalysis: false
